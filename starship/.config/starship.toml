"$schema" = 'https://starship.rs/config-schema.json'

format = """
$custom\
$directory\
$git_branch\
$git_status\
$python\
$line_break\
$character"""

palette = 'catppuccin_macchiato'

# Show full hostname only on remote sessions (devpod or SSH)
[custom.remote_env]
command = "hostname"
when = '[ -n "$DEVPOD" ] || [ -n "$CODER_WORKSPACE_NAME" ] || [ -d /workspaces ] || [ -n "$SSH_CONNECTION" ]'
style = "bold fg:mauve"
format = "[$output ]($style)"

[directory]
style = "fg:peach"
format = "[$path ]($style)"
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo = false

[git_branch]
symbol = " "
style = "fg:lavender"
format = "[$symbol$branch ]($style)"

[git_status]
style = "fg:yellow"
format = '([$all_status$ahead_behind]($style))'
modified = "*"
staged = "+"
untracked = "?"
deleted = "✘"
renamed = "»"
stashed = "$"
ahead = "↑"
behind = "↓"
diverged = "⇕"
conflicted = "!"

[python]
style = "fg:green"
format = "[$virtualenv ]($style)"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "setup.cfg", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
