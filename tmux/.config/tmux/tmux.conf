set -g status-position top
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g renumber-windows on       # renumber all windows when any window is closed
set -g history-limit 1000000     # increase history size (from 2,000)
set -g escape-time 0             # zero-out escape time delay
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g set-clipboard on          # use system clipboard
set -g automatic-rename on       # rename window to running command
set -g allow-rename off          # don't let the shell override the window name
set -g @catppuccin_directory_text "#{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Catppuccin — change 'macchiato' to latte/frappe/mocha to switch flavors
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_default_text "#W"

# Initialize TPM — Catppuccin must run before status line is configured
run '~/.tmux/plugins/tpm/tpm'

# Status bar — session name on left, current folder on right
# (must come after run so Catppuccin variables are defined)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
